owner: bonedoc911
repo: ott-status

sites:
  - name: OpenTrustToken API
    url: https://api.opentrusttoken.com/health
    expectedStatusCodes:
      - 200

  - name: OpenTrustToken Landing
    url: https://opentrusttoken.com
    expectedStatusCodes:
      - 200

  - name: OpenTrustToken Dashboard
    url: https://opentrusttoken.com/dashboard.html
    expectedStatusCodes:
      - 200

status-website:
  cname: ""
  logoUrl: ""
  name: OpenTrustToken Status
  theme: dark
  introTitle: "OpenTrustToken system status"
  introMessage: "Real-time monitoring of the OpenTrustToken API and web properties. Updated every 5 minutes."

workflowSchedule:
  graphs: "0 0 * * *"
  responseTime: "0 23 * * *"
  staticSite: "0 1 * * *"
  summary: "0 0 * * *"
  updateTemplate: "0 0 * * *"
  uptime: "*/5 * * * *"

commitMessages:
  statusChange: "$PREFIX $SITE_NAME is $STATUS ($RESPONSE_CODE in $RESPONSE_TIME ms)"
  commitPrefix: "[status]"

i18n:
  activeIncidents: Active incidents
  pastIncidents: Past incidents
  pastIncidentsResolved: Resolved
  allSystemsOperational: All systems operational
  notAllSystemsOperational: Not all systems operational
